# Place this file at: /etc/nginx/sites-available/shepherdcare
# Then: sudo ln -s /etc/nginx/sites-available/shepherdcare /etc/nginx/sites-enabled/shepherdcare
#
# Step 1 — deploy this HTTP-only block first, then run certbot:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d SGCh.al-hanna.com
# Certbot will automatically add the SSL block below.

server {
    listen 80;
    server_name SGCh.al-hanna.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name SGCh.al-hanna.com;

    # Managed by certbot
    ssl_certificate /etc/letsencrypt/live/SGCh.al-hanna.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SGCh.al-hanna.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
